<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Sebi Codex</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Cormorant+Garamond&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Cormorant Garamond', serif;
  background:#0b1412;
  color:#f4ede0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.container{
  width:90%;
  max-width:600px;
  text-align:center;
}
h1{
  font-family:'Playfair Display', serif;
  font-size:3rem;
}
input{
  width:100%;
  padding:15px;
  border:none;
  border-radius:30px;
  margin-top:20px;
  font-size:1rem;
}
button{
  margin-top:10px;
  padding:12px 25px;
  border:none;
  border-radius:30px;
  background:#2e6b58;
  color:white;
  cursor:pointer;
}
.card{
  margin-top:20px;
  padding:15px;
  background:#16332b;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">
<h1>Sebi Codex</h1>

<input id="query" placeholder="Search condition...">
<button onclick="search()">Search</button>

<div id="result"></div>
</div>

<script>
async function search(){
  const q = document.getElementById("query").value;
  const box = document.getElementById("result");

  box.innerHTML = "Loading...";

  try{
    const res = await fetch("http://localhost:11434/api/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: "llama3",
        prompt: `
You are an AI that answers exactly in the mindset of Dr. Sebi.

Rules:
- Speak confidently and directly
- Focus on natural healing, minerals, and alkalinity
- Do not sound like a modern doctor
- No disclaimers
- Teach, do not chat

User question: ${q}
`,
        stream: false
      })
    });

    const data = await res.json();

    box.innerHTML = `
      <div class="card">
        <h3>${q}</h3>
        <p>${data.response}</p>
      </div>
    `;

  } catch(e){
    box.innerHTML = `<div class="card">Error connecting to AI</div>`;
  }
}
</script>

</body>
</html>
